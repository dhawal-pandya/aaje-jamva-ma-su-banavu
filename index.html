<!DOCTYPE html>
<html lang="gu">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>આજે જમવામાં શું બનાવું?</title>

  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Gujarati:wght@400;600;700&family=Tiro+Devanagari+Sanskrit:ital@0;1&display=swap" rel="stylesheet">

  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            cream:  '#FFF8E7',
            saffron:'#FF6B00',
            gold:   '#C8860A',
            maroon: '#4A0E0E',
          }
        }
      }
    }
  </script>

  <style>
    /* ── CSS variable defaults (overridden by palette.js at runtime) ── */
    :root {
      --r-outer:   #FF6B00;
      --r-mid:     #8B1A1A;
      --r-inner:   #E8A020;
      --r-dot:     #C8860A;
      --r-frame:   #4A0E0E;
      --c-saffron: #FF6B00;
      --c-gold:    #C8860A;
      --c-maroon:  #4A0E0E;
      --c-bg:      #FFF8E7;
      --c-grid:    #C8860A22;
    }

    * { -webkit-tap-highlight-color: transparent; }

    body {
      font-family: 'Noto Sans Gujarati', sans-serif;
      background-color: var(--c-bg);
      background-image: radial-gradient(var(--c-grid) 1px, transparent 1px);
      background-size: 28px 28px;
      transition: background-color 0.6s ease;
    }

    .devanagari { font-family: 'Tiro Devanagari Sanskrit', serif; }

    /* ── rangoli slow-spin ── */
    @keyframes slowSpin {
      to { transform: rotate(360deg); }
    }
    #outerDots {
      transform-box: fill-box;
      transform-origin: center;
      animation: slowSpin 90s linear infinite;
    }

    /* ── festival banner ── */
    #festival-banner {
      opacity: 0;
      max-height: 0;
      overflow: hidden;
      transition: opacity 0.4s ease, max-height 0.4s ease;
    }
    #festival-banner.visible {
      opacity: 1;
      max-height: 3rem;
    }

    /* ── main button (title text only, with Indian double-border) ── */
    #main-btn {
      background: none;
      border: none;
      padding: 0.6rem 1.6rem;
      cursor: pointer;
      position: relative;
      display: inline-block;
      transition: transform 0.15s ease;
    }
    #main-btn:active { transform: scale(0.96); }

    /* outer decorative border */
    #main-btn::before {
      content: '';
      position: absolute;
      inset: 0;
      border: 2px solid var(--c-gold);
      border-radius: 2px;
    }
    /* inner rule */
    #main-btn::after {
      content: '';
      position: absolute;
      inset: 5px;
      border: 1px solid var(--c-gold);
      border-radius: 1px;
      opacity: 0.5;
    }

    .title-text {
      background: linear-gradient(145deg, var(--c-saffron) 0%, var(--c-gold) 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      line-height: 1.25;
    }

    /* subtle breathing pulse to hint interactivity */
    @keyframes breathe {
      0%, 100% { opacity: 1; }
      50%       { opacity: 0.72; }
    }
    #main-btn:not(:active) .title-text {
      animation: breathe 3.5s ease-in-out infinite;
    }

    /* ── press hint ── */
    #press-hint {
      transition: opacity 0.4s ease;
    }
    #press-hint.hidden { opacity: 0; pointer-events: none; }

    /* ── dish result ── */
    #result {
      opacity: 0;
      transform: translateY(14px);
      transition: opacity 0.32s ease, transform 0.32s ease;
    }
    #result.visible {
      opacity: 1;
      transform: translateY(0);
    }

    .dish-name-gu {
      background: linear-gradient(135deg, var(--c-maroon) 0%, var(--c-saffron) 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    /* ── rangoli drop-shadow ── */
    .rangoli-wrap {
      filter: drop-shadow(0 0 14px color-mix(in srgb, var(--r-outer) 28%, transparent));
    }
  </style>
</head>

<body class="min-h-screen flex flex-col items-center justify-center px-4 py-10 select-none">

  <!-- Ganesh invocation — full width, always on top -->
  <p class="devanagari text-sm tracking-widest opacity-50 mb-3"
     style="color: var(--c-maroon)">
    ॥ श्री गणेशाय नमः ॥
  </p>

  <!-- Festival banner (hidden by default, shown by app.js) -->
  <div id="festival-banner"
       class="text-center text-sm font-semibold tracking-wide mb-3 px-4"
       style="color: var(--c-maroon)">
    <span id="festival-name"></span>
  </div>

  <!-- ── Main area: stacked on mobile, side-by-side on desktop ── -->
  <div class="flex flex-col items-center lg:flex-row lg:items-center lg:gap-16 w-full max-w-5xl lg:px-8">

    <!-- Left / Top: Rangoli — decorative, NOT a button -->
    <div class="rangoli-wrap pointer-events-none flex-shrink-0">
      <svg viewBox="0 0 200 200"
           class="w-[19rem] h-[19rem] sm:w-[22rem] sm:h-[22rem] lg:w-[28rem] lg:h-[28rem]"
           xmlns="http://www.w3.org/2000/svg"
           aria-hidden="true">

        <!-- outer dashed frame -->
        <circle cx="100" cy="100" r="91"
                fill="none" stroke="var(--r-frame)" stroke-width="0.7"
                stroke-dasharray="3 5" opacity="0.3"/>

        <!-- outer dot ring — slow spin -->
        <g id="outerDots">
          <circle cx="183"   cy="100"   r="2.8" fill="var(--r-frame)" opacity="0.5"/>
          <circle cx="171.8" cy="141.5" r="2.8" fill="var(--r-frame)" opacity="0.5"/>
          <circle cx="141.5" cy="171.8" r="2.8" fill="var(--r-frame)" opacity="0.5"/>
          <circle cx="100"   cy="183"   r="2.8" fill="var(--r-frame)" opacity="0.5"/>
          <circle cx="58.5"  cy="171.8" r="2.8" fill="var(--r-frame)" opacity="0.5"/>
          <circle cx="28.2"  cy="141.5" r="2.8" fill="var(--r-frame)" opacity="0.5"/>
          <circle cx="17"    cy="100"   r="2.8" fill="var(--r-frame)" opacity="0.5"/>
          <circle cx="28.2"  cy="58.5"  r="2.8" fill="var(--r-frame)" opacity="0.5"/>
          <circle cx="58.5"  cy="28.2"  r="2.8" fill="var(--r-frame)" opacity="0.5"/>
          <circle cx="100"   cy="17"    r="2.8" fill="var(--r-frame)" opacity="0.5"/>
          <circle cx="141.5" cy="28.2"  r="2.8" fill="var(--r-frame)" opacity="0.5"/>
          <circle cx="171.8" cy="58.5"  r="2.8" fill="var(--r-frame)" opacity="0.5"/>
        </g>

        <!-- large outer petals: 8 × 45° -->
        <g fill="var(--r-outer)" fill-opacity="0.65" stroke="var(--r-outer)" stroke-width="0.4">
          <path d="M100 100 C119 74,116 30,100 20 C84 30,81 74,100 100" transform="rotate(0,100,100)"/>
          <path d="M100 100 C119 74,116 30,100 20 C84 30,81 74,100 100" transform="rotate(45,100,100)"/>
          <path d="M100 100 C119 74,116 30,100 20 C84 30,81 74,100 100" transform="rotate(90,100,100)"/>
          <path d="M100 100 C119 74,116 30,100 20 C84 30,81 74,100 100" transform="rotate(135,100,100)"/>
          <path d="M100 100 C119 74,116 30,100 20 C84 30,81 74,100 100" transform="rotate(180,100,100)"/>
          <path d="M100 100 C119 74,116 30,100 20 C84 30,81 74,100 100" transform="rotate(225,100,100)"/>
          <path d="M100 100 C119 74,116 30,100 20 C84 30,81 74,100 100" transform="rotate(270,100,100)"/>
          <path d="M100 100 C119 74,116 30,100 20 C84 30,81 74,100 100" transform="rotate(315,100,100)"/>
        </g>

        <!-- medium petals: offset 22.5°, tip at r=60 -->
        <g fill="var(--r-mid)" fill-opacity="0.78" stroke="var(--r-mid)" stroke-width="0.35">
          <path d="M100 100 C116 76,113 44,100 38 C87 44,84 76,100 100" transform="rotate(22.5,100,100)"/>
          <path d="M100 100 C116 76,113 44,100 38 C87 44,84 76,100 100" transform="rotate(67.5,100,100)"/>
          <path d="M100 100 C116 76,113 44,100 38 C87 44,84 76,100 100" transform="rotate(112.5,100,100)"/>
          <path d="M100 100 C116 76,113 44,100 38 C87 44,84 76,100 100" transform="rotate(157.5,100,100)"/>
          <path d="M100 100 C116 76,113 44,100 38 C87 44,84 76,100 100" transform="rotate(202.5,100,100)"/>
          <path d="M100 100 C116 76,113 44,100 38 C87 44,84 76,100 100" transform="rotate(247.5,100,100)"/>
          <path d="M100 100 C116 76,113 44,100 38 C87 44,84 76,100 100" transform="rotate(292.5,100,100)"/>
          <path d="M100 100 C116 76,113 44,100 38 C87 44,84 76,100 100" transform="rotate(337.5,100,100)"/>
        </g>

        <!-- inner petals: 8 × 45°, tip at r=48 -->
        <g fill="var(--r-inner)" fill-opacity="0.82" stroke="var(--r-inner)" stroke-width="0.3">
          <path d="M100 100 C112 80,110 55,100 52 C90 55,88 80,100 100" transform="rotate(0,100,100)"/>
          <path d="M100 100 C112 80,110 55,100 52 C90 55,88 80,100 100" transform="rotate(45,100,100)"/>
          <path d="M100 100 C112 80,110 55,100 52 C90 55,88 80,100 100" transform="rotate(90,100,100)"/>
          <path d="M100 100 C112 80,110 55,100 52 C90 55,88 80,100 100" transform="rotate(135,100,100)"/>
          <path d="M100 100 C112 80,110 55,100 52 C90 55,88 80,100 100" transform="rotate(180,100,100)"/>
          <path d="M100 100 C112 80,110 55,100 52 C90 55,88 80,100 100" transform="rotate(225,100,100)"/>
          <path d="M100 100 C112 80,110 55,100 52 C90 55,88 80,100 100" transform="rotate(270,100,100)"/>
          <path d="M100 100 C112 80,110 55,100 52 C90 55,88 80,100 100" transform="rotate(315,100,100)"/>
        </g>

        <!-- inner dot ring at r=44 -->
        <g fill="var(--r-dot)" opacity="0.4">
          <circle cx="144"   cy="100"   r="2.2"/>
          <circle cx="131.1" cy="131.1" r="2.2"/>
          <circle cx="100"   cy="144"   r="2.2"/>
          <circle cx="68.9"  cy="131.1" r="2.2"/>
          <circle cx="56"    cy="100"   r="2.2"/>
          <circle cx="68.9"  cy="68.9"  r="2.2"/>
          <circle cx="100"   cy="56"    r="2.2"/>
          <circle cx="131.1" cy="68.9"  r="2.2"/>
        </g>

        <!-- center jewel -->
        <circle cx="100" cy="100" r="9"   fill="var(--r-outer)" opacity="0.9"/>
        <circle cx="100" cy="100" r="5.5" fill="var(--r-frame)"/>
        <circle cx="100" cy="100" r="2.5" fill="#FFD700"/>
      </svg>
    </div>

    <!-- Right / Bottom: button + hint + context + dish result -->
    <div class="flex flex-col items-center flex-1 min-w-0 mt-1 lg:mt-0">

      <!-- Button: title text with Indian double-border -->
      <button id="main-btn" aria-label="આજે જમવામાં શું બનાવું?">
        <p class="title-text text-3xl sm:text-4xl lg:text-5xl font-bold text-center">
          આજે જમવામાં<br>શું બનાવું?
        </p>
      </button>

      <!-- Press hint — fades out after first tap -->
      <p id="press-hint" class="text-sm mt-3 tracking-wide opacity-40"
         style="color: var(--c-maroon)">
        દબાવો ↑
      </p>

      <!-- Context line: season · occasion · meal -->
      <p id="context-line"
         class="text-xs mt-1 tracking-widest opacity-25"
         style="color: var(--c-maroon)">
      </p>

      <!-- Dish result -->
      <div id="result" class="mt-8 text-center w-full max-w-md px-2">
        <!-- Gujarati name — big, primary -->
        <p id="dish-name-gu"
           class="dish-name-gu text-[2.75rem] sm:text-[3.5rem] lg:text-[4rem] font-bold leading-snug"></p>
        <!-- English name — small, secondary -->
        <p id="dish-name-en"
           class="text-sm sm:text-base lg:text-lg mt-1 font-semibold opacity-50"
           style="color: var(--c-maroon)"></p>
        <!-- Note -->
        <p id="dish-note"
           class="text-base lg:text-lg mt-3 opacity-50 italic leading-relaxed"
           style="color: var(--c-maroon)"></p>
      </div>

    </div>
  </div>
  <!-- ── end main area ── -->

  <!-- footer -->
  <p class="devanagari opacity-20 text-base mt-12" style="color: var(--c-maroon)">✦ ✦ ✦</p>

  <script src="data.js"></script>
  <script src="panchang.js"></script>
  <script src="scoring.js"></script>
  <script src="session.js"></script>
  <script src="palette.js"></script>
  <script src="app.js"></script>
</body>
</html>
